# =============================================================
# Jarvis Infrastructure — PostgreSQL 16 + Redis 7
# Run separately so DBs can stay up during agent rebuilds
# =============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: jarvis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jarvis
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /home/paluss/docker/appdata/jarvis-pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jarvis-net
    mem_limit: 512m
    cpus: "0.50"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: jarvis-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - /home/paluss/docker/appdata/jarvis-redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jarvis-net
    mem_limit: 256m
    cpus: "0.20"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  jarvis-net:
    driver: bridge
