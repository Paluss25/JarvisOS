[project]
name = "mailctl"
version = "0.1.0"
description = "Direct IMAP/SMTP email CLI for JarvisOS agents and human shell use"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.0.0",
  "pydantic-settings>=2.0.0",
  "python-dotenv>=1.0.0",
  "pyyaml>=6.0",
  "typer>=0.12.0",
]

[project.scripts]
mailctl = "mailctl.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
