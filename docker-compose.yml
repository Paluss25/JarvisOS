# =============================================================================
# JarvisOS Platform — multi-agent container + Redis + Cloudflare Tunnel
# Deploy on: .139 (Docker-AI)
# =============================================================================

services:
  jarvios:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvios-platform
    restart: unless-stopped
    ports:
      - "8800:8000"   # Jarvis agent (Telegram webhook, direct API)
      - "8900:8900"   # Platform API (dashboard, management)
    env_file: /home/paluss/docker/.env
    labels:
      # Jarvis API — jarvis.prova9x.com
      - "traefik.enable=true"
      - "traefik.http.routers.jarvis.rule=Host(`jarvis.prova9x.com`)"
      - "traefik.http.routers.jarvis.entrypoints=websecure"
      - "traefik.http.routers.jarvis.middlewares=crowdsec-bouncer@file"
      - "traefik.http.services.jarvis.loadbalancer.server.port=8000"
      # Dashboard — jarvis-dashboard.prova9x.com
      - "traefik.http.routers.jarvis-dashboard.rule=Host(`jarvis-dashboard.prova9x.com`)"
      - "traefik.http.routers.jarvis-dashboard.entrypoints=websecure"
      - "traefik.http.routers.jarvis-dashboard.middlewares=crowdsec-bouncer@file"
      - "traefik.http.services.jarvis-dashboard.loadbalancer.server.port=8900"
    volumes:
      - /home/paluss/docker/appdata/jarvios-workspaces:/app/workspace
      - /home/paluss/docker/appdata/jarvios-shared:/app/shared
      - /home/paluss/docker/appdata/jarvios-dot-claude:/root/.claude
      - /home/paluss/.claude/.credentials.json:/root/.claude/.credentials.json
      - /home/paluss/docker/.env:/app/.env:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - jarvios-net
      - agents-net
      - socket_proxy
    mem_limit: 6g
    cpus: "6.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: jarvios-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - /home/paluss/docker/appdata/jarvios-redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jarvios-net
    mem_limit: 256m
    cpus: "0.20"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: jarvios-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      jarvios:
        condition: service_healthy
    networks:
      - jarvios-net
    mem_limit: 128m
    cpus: "0.10"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

networks:
  jarvios-net:
    driver: bridge
  agents-net:
    name: agents-net
    external: true
  socket_proxy:
    external: true
