# =============================================================================
# JarvisOS Platform — multi-agent container + Redis + Cloudflare Tunnel
# Deploy on: .139 (Docker-AI)
# =============================================================================

name: jarvios-platform

services:
  jarvios:
    image: 10.10.200.61:5000/jarvios-platform:latest
    container_name: jarvios-platform
    restart: unless-stopped
    ports:
      - "8800:8000"   # Jarvis agent (Telegram webhook, direct API)
      - "8801:8001"   # Roger agent (Chief of Sport)
      - "8802:8002"   # Timothy agent (CIO)
      - "8803:8003"   # Warren agent (CFO)
      - "8804:8004"   # CHRO agent (Chief People Officer)
      - "8805:8005"   # EmailIntelligence agent
      - "8806:8006"   # DrHouse agent (Chief of Health)
      - "8807:8007"   # NutritionDirector agent
      - "8808:8008"   # ChiefOfStaff agent (COS)
      - "8809:8009"   # MT agent (Executive Assistant)
      - "8900:8900"   # Platform API (dashboard, management)
      - "8013:8013"   # worker-ops-detector (Grafana webhook + health)
      - "8014:8014"   # cfo-strategy-workers (heavy on-demand strategy sub-agents)
    env_file: /home/paluss/docker/.env
    dns:
      - 10.10.200.62
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "monitoring:10.10.200.71"
      - "docker-heavy:10.10.200.71"
    environment:
      LOKI_URL: "http://10.10.200.71:3100"
      RUNBOOKS_PATH: "/app/runbooks"
      DETECTOR_POLL_INTERVAL: "300"
      DETECTOR_LOOKBACK_MINUTES: "10"
      DETECTOR_PORT: "8013"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://10.10.200.139:4317"
      OTEL_SERVICE_NAME: "jarvios-platform"
      MEMORY_BOX_URL: "http://10.10.200.139:8000"
      CEO_TELEGRAM_WEBHOOK_URL: "https://jarvis-dashboard.prova9x.com/webhooks/ceo"
      CFO_TELEGRAM_WEBHOOK_URL: "https://jarvis-dashboard.prova9x.com/webhooks/cfo"
      CHRO_TELEGRAM_WEBHOOK_URL: "https://jarvis-dashboard.prova9x.com/webhooks/chro"
      COH_TELEGRAM_WEBHOOK_URL: "https://jarvis-dashboard.prova9x.com/webhooks/coh"
      CIO_TELEGRAM_WEBHOOK_URL: "https://jarvis-dashboard.prova9x.com/webhooks/cio"
      COS_TELEGRAM_WEBHOOK_URL: "https://jarvis-dashboard.prova9x.com/webhooks/cos"
      MT_TELEGRAM_WEBHOOK_URL: "https://jarvis-dashboard.prova9x.com/webhooks/mt"
      MATTERMOST_URL: "https://mattermost.prova9x.com"
      CEO_MATTERMOST_CHANNEL_ID: "mziuom3nxpbs8rbgsy99u9686a"
      COH_MATTERMOST_CHANNEL_ID: "uc6ctusnrpf1ifi1cxb3eej5jo"
      MT_MATTERMOST_CHANNEL_ID: "3ejph99crtrjtk5eeuc46fe4oa"
      PROMETHEUS_URL: "https://prometheus.prova9x.com"
      UNIFI_URL: "https://10.10.10.1"
      # ── A2A async — per-agent timeout overrides ────────────────────────────
      # Outer cap (agent_max_turn_s) must be >= inner stream_timeout_s + 30s.
      # COH/DON: nutrition pipeline has many sequential tool calls + reasoning;
      # 480s default leaves no headroom and times out mid-summary.
      JARVIOS_STREAM_TIMEOUT_COH: "720"
      JARVIOS_AGENT_MAX_TURN_S_COH: "780"
      JARVIOS_STREAM_TIMEOUT_DON: "720"
      JARVIOS_AGENT_MAX_TURN_S_DON: "780"
      # Disable extended thinking for COH/DON — nutrition logging is
      # high-frequency, low-ambiguity work. Extended thinking adds 1000+
      # invisible tokens per turn that don't improve a meal-summary; on
      # 30+ logs per day the saved latency adds up. Per-agent override via
      # env_prefix (DRHOUSE_/NUTRITION_) so other agents keep thinking on.
      DRHOUSE_CLAUDE_THINKING: "false"
      NUTRITION_CLAUDE_THINKING: "false"
      MAILCTL_CONFIG_DIR: "/home/paluss/docker/agents"
      MAILCTL_SORTING_RULES_PATH: "/app/workspace/mt/sorting_rules.yaml"
    labels:
      # Jarvis API — jarvis.prova9x.com
      - "traefik.enable=true"
      - "traefik.http.routers.jarvis.rule=Host(`jarvis.prova9x.com`)"
      - "traefik.http.routers.jarvis.entrypoints=websecure"
      - "traefik.http.routers.jarvis.middlewares=crowdsec-bouncer@file"
      - "traefik.http.routers.jarvis.service=jarvis"
      - "traefik.http.services.jarvis.loadbalancer.server.port=8000"
      # Dashboard — jarvis-dashboard.prova9x.com
      - "traefik.http.routers.jarvis-dashboard.rule=Host(`jarvis-dashboard.prova9x.com`)"
      - "traefik.http.routers.jarvis-dashboard.entrypoints=websecure"
      - "traefik.http.routers.jarvis-dashboard.middlewares=crowdsec-bouncer@file"
      - "traefik.http.routers.jarvis-dashboard.service=jarvis-dashboard"
      - "traefik.http.services.jarvis-dashboard.loadbalancer.server.port=8900"
    volumes:
      - /home/paluss/docker/appdata/jarvios-workspaces:/app/workspace
      - /home/paluss/docker/appdata/jarvios-shared-issues:/app/workspace/shared/issues
      - /home/paluss/docker/appdata/jarvios-shared:/app/shared
      - /home/paluss/docker/appdata/jarvios-dot-claude:/root/.claude
      - /home/paluss/docker/.env:/app/.env:ro
      - /home/paluss/docker/.env:/home/paluss/docker/.env:rw
      - /home/paluss/docker/agents:/home/paluss/docker/agents:ro
      - /home/paluss/Brains/HomeLab/operations/runbooks/jarvios:/app/runbooks:rw
      - /home/paluss/docker/compose/jarvisOS/var/audit:/app/var/audit:rw
      - /home/paluss/docker/compose/jarvisOS/memory/schemas:/app/memory/schemas:ro
      - /home/paluss/.ssh/id_ed25519:/root/.ssh/id_ed25519:ro
      - /mnt/Brains/Sport:/mnt/Brains/Sport:ro
      - /mnt/Brains/HR:/app/hr-docs:rw
      - /mnt/Brains/Sport:/app/sport-docs:ro
      - /mnt/Brains/Medical:/app/medical-docs:rw
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - jarvios-net
      - agents-net
      - socket_proxy
      - db-net
    mem_limit: 6g
    cpus: "6.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: jarvios-redis
    restart: unless-stopped
    env_file: /home/paluss/docker/.env
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - /home/paluss/docker/appdata/jarvios-redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jarvios-net
    mem_limit: 256m
    cpus: "0.20"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: jarvios-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      jarvios:
        condition: service_healthy
    networks:
      - jarvios-net
    mem_limit: 128m
    cpus: "0.10"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

networks:
  jarvios-net:
    driver: bridge
  agents-net:
    name: agents-net
    external: true
  socket_proxy:
    external: true
  db-net:
    name: db-net
    external: true
