# =============================================================================
# Jarvis — Full Stack (agent + PostgreSQL 16 + Redis 7)
# =============================================================================
# Supersedes docker-compose.infra.yml (infra file kept for reference only)

services:
  jarvis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis-agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: /home/paluss/docker/.env
    volumes:
      - /home/paluss/docker/appdata/jarvis-workspace:/app/workspace
      - /home/paluss/.codex:/root/.codex:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - jarvis-net
    mem_limit: 4g
    cpus: "4.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  postgres:
    image: postgres:16-alpine
    container_name: jarvis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jarvis
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /home/paluss/docker/appdata/jarvis-pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jarvis-net
    mem_limit: 512m
    cpus: "0.50"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: jarvis-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - /home/paluss/docker/appdata/jarvis-redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jarvis-net
    mem_limit: 256m
    cpus: "0.20"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  jarvis-net:
    driver: bridge
