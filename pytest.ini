[pytest]
testpaths = tests
pythonpath = src
addopts = -ra
markers =
    unit: fast tests that do not require external services
    integration: tests that exercise multiple components or service adapters
    e2e: end-to-end tests that touch real runtime boundaries
    slow: tests that are expected to take noticeably longer than unit tests
    asyncio: async tests; enabled by pytest-asyncio in the next cleanup step
