; supervisord.conf — JarvisOS platform
[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

[unix_http_server]
file=/var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

; Platform API — always starts first
[program:platform-api]
command=python -m platform.run
directory=/app
environment=PLATFORM_PORT=8900
autorestart=true
priority=1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; Agent programs are appended by gen_supervisord.py
; Include generated agent configs
[include]
files = /etc/supervisor/conf.d/*.conf
