platform:
  pipeline_model: gemini-2.5-flash
  pipeline_fallback: haiku
  postgresql_url_env: JARVIOS_POSTGRES_URL
  redis_url_env: REDIS_URL
agents:
- id: jarvis
  port: 8000
  workspace: workspace/jarvis
  telegram_token_env: TELEGRAM_JARVIS_TOKEN
  telegram_chat_id_env: TELEGRAM_ALLOWED_CHAT_ID
  domains:
  - '*'
  capabilities:
  - delegation
  - planning
  - coordination
  - general-knowledge
  memory:
    backend: filesystem
- id: roger
  port: 8001
  workspace: workspace/roger
  reports_to: drhouse
  domains:
  - sport
  - fitness
  capabilities:
  - sport-analysis
  - training-plans
  - race-strategy
  - performance-tracking
  memory:
    backend: filesystem
- id: timothy
