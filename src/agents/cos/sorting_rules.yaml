# sorting_rules.yaml
# COS Email Auto-Sorter — user-defined rules
#
# Rule format:
#   name:       Human-readable label (for logs)
#   match:      "all" (AND) | "any" (OR)
#   conditions: one or more of:
#     sender:           glob pattern (e.g. "*@amazon.it")
#     subject_contains: substring or list of substrings
#     body_contains:    substring or list of substrings
#     primary_domain:   classifier output (finance, health, work, personal…)
#     priority:         high | normal | low
#     sensitivity:      public | internal | confidential
#   folder:     target IMAP folder (created automatically if missing)
#
# Rules are evaluated in order — the first match wins.

version: 1
defaults:
  create_folder_if_missing: true
  on_no_match: keep

rules: []
