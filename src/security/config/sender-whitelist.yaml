# Sender Whitelist — classification overrides for known trusted senders
#
# Hot-reloaded on every classify() call (no container restart required).
# Edit this file to add/remove senders at runtime.
#
# Two override types:
#   email_overrides:  exact match on the full sender address
#   domain_overrides: suffix match on the sender domain (@company.com)
#
# Standard fields:
#   domain:     primary_domain to force (finance | legal | security | hr | ops | marketing | general)
#   confidence: injected confidence score, 0.0–1.0 (default: 1.0)
#   note:       human-readable reason (optional, ignored by code)
#
# Extended fields for EIA→CFO auto-ingest (used by email_extraction worker):
#   ynab_account_id:      YNAB account UUID to post the transaction to.
#                         null = skip YNAB write for this sender.
#   subject_must_match:   regex applied to subject before routing to YNAB.
#                         If set and subject does NOT match, YNAB write is skipped.
#   ynab_account_source:  "static" (default) or "body_extract".
#                         "body_extract" = parse "Hai pagato X con PROVIDER" from body
#                         and resolve via body_account_map below.
#   body_account_map:     map of provider name (case-insensitive) → YNAB account UUID.
#                         Used only when ynab_account_source: body_extract.

email_overrides:

  # --- Mediobanca Premier ---
  # Only route to YNAB when subject mentions mortgage payments or transfers.
  # Document-availability notifications ("Nuovi documenti disponibili") are skipped.
  "no-reply@mediobancapremier.com":
    domain: finance
    confidence: 1.0
    ynab_account_id: "e586d58c-bcac-48c6-848c-b219e00e0ea4"
    subject_must_match: "mutuo|rata|addebito|bonifico|pagamento|trasferimento|scadenza"
    note: "Mediobanca Premier — mortgage payments and wire transfers only"

  # --- PayPal ---
  # Payment method is encoded in the body: "Hai pagato X con FINECO".
  # Resolved dynamically; no static ynab_account_id.
  "assistenza@paypal.it":
    domain: finance
    confidence: 1.0
    ynab_account_id: null
    ynab_account_source: body_extract
    body_account_map:
      "FINECO":            "6a5f6142-31c7-43e9-bf0c-ebd8bd27a37a"
      "FINECO GOLD":       "d51958c6-1bc8-442b-8586-e155a7e55671"
      "AMEX":              "2609b853-bc94-4e26-bd97-6e1b81d17ead"
      "AMERICAN EXPRESS":  "2609b853-bc94-4e26-bd97-6e1b81d17ead"
      "SATISPAY":          "b90599f6-17a5-4c93-bc7a-bf174adcde63"
      "REVOLUT":           "85e8e74e-f3d3-46f8-80a5-1a24438d6040"
      "MEDIOBANCA":        "e586d58c-bcac-48c6-848c-b219e00e0ea4"
    note: "PayPal — extract payment method from body text"

  # --- Amazon: suppress finance misclassification ---
  # Payment provider (AMEX/Fineco) sends its own notification — Amazon emails would duplicate.
  "shipment-tracking@amazon.it":
    domain: general
    confidence: 1.0
    ynab_account_id: null
    note: "Amazon shipping tracker — not a transaction, skip YNAB"

  "conferma-spedizione@amazon.it":
    domain: general
    confidence: 1.0
    ynab_account_id: null
    note: "Amazon shipping confirmation — not a transaction, skip YNAB"

  "conferma-ordine@amazon.it":
    domain: general
    confidence: 1.0
    ynab_account_id: null
    note: "Amazon order confirmation — payment provider will notify separately"

  # --- SEA Milano e-Shop ---
  "infoeshop@seamilano.eu":
    domain: general
    confidence: 1.0
    ynab_account_id: null
    note: "SEA Milano invoice — payment provider notifies separately, skip YNAB"


